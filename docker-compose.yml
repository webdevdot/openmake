name: openmake

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openmake}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openmake_dev}
      POSTGRES_DB: ${POSTGRES_DB:-openmake}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER:-openmake}']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-openmake}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-openmake_dev_secret}
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 3s
      retries: 10

  # Application services (built in the final phase; enable with --profile app)
  server:
    profiles: ['app']
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-openmake}:${POSTGRES_PASSWORD:-openmake_dev}@db:5432/${POSTGRES_DB:-openmake}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
    ports:
      - '${SERVER_PORT:-8080}:8080'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  web:
    profiles: ['app']
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    ports:
      - '${WEB_PORT:-3000}:80'
    depends_on:
      - server

volumes:
  dbdata:
  miniodata:
